name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: Quality (build · lint · format · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

  db-policies:
    name: DB policy tests (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Boots the local stack (applies every migration to a fresh Postgres)
      # and runs supabase/tests/*.sql with pg_prove. Heavy services that the
      # SQL-level tests never touch are excluded to keep the job fast.
      - run: supabase start -x studio,imgproxy,inbucket,realtime,edge-runtime,analytics,vector
      - run: supabase test db
      - if: always()
        run: supabase stop --no-backup
